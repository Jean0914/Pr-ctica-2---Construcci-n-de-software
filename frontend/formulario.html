<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post - Nadir Blog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="brand">Nadir Blog</a>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="admin.html">Dashboard</a>
    </nav>
  </header>
  
  <main>
    <div class="card" style="max-width: 800px; margin: 0 auto;">
      <h2 id="form-title">Cargando...</h2>
      <div id="error-message"></div>
      <form id="post-form">
        <div class="form-group">
          <label for="titulo">Título del Post</label>
          <input type="text" id="titulo" name="titulo">
        </div>
        <div class="form-group">
          <label for="contenido">Contenido</label>
          <textarea id="contenido" name="contenido"></textarea>
        </div>
        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
          <a href="admin.html" class="btn btn-secondary">Cancelar</a>
          <button type="submit" class="btn btn-primary" id="save-btn">Guardar Cambios</button>
        </div>
      </form>
    </div>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
