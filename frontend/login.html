<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Nadir Blog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="brand">Nadir Blog</a>
    <nav>
      <a href="index.html">Inicio</a>
    </nav>
  </header>
  
  <main>
    <div class="login-container card">
      <h2 class="text-center" style="color: #fff; margin-top: 0;">Iniciar sesión</h2>
      <div id="error-message"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Ingresar</button>
      </form>
    </div>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
